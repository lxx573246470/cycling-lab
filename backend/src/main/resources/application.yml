spring:
  application:
    name: cycling-lab-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cycling_lab}
    username: ${SPRING_DATASOURCE_USERNAME:cycling_lab}
    password: ${SPRING_DATASOURCE_PASSWORD:cycling_lab}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

cyclinglab:
  jwt:
    # HS256 secret. MUST be overridden in production via env (>= 32 chars).
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-please}
    access-token-ttl-seconds: 900
    refresh-token-ttl-seconds: 604800
    issuer: cycling-lab
  auth:
    disabled: ${AUTH_DISABLED:true}
    local-user:
      email: ${AUTH_LOCAL_EMAIL:local@cycling-lab.local}
      display-name: ${AUTH_LOCAL_DISPLAY_NAME:Local Rider}
  storage:
    local:
      root: ${TRAINING_LOCAL_ROOT:${CYCLINGLAB_CONTENT_ROOT:..}/training/uploaded}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:cycling-lab}
  content:
    root: ${CYCLINGLAB_CONTENT_ROOT:..}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    root: INFO
    com.cyclinglab: DEBUG
    org.springframework.security: INFO

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false

cyclinglab:
  auth:
    disabled: ${AUTH_DISABLED:false}
