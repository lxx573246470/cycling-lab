spring:
  datasource:
    url: jdbc:h2:mem:cycling_lab_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: sa
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

cyclinglab:
  jwt:
    secret: test-secret-test-secret-test-secret-test-secret
    access-token-ttl-seconds: 900
    refresh-token-ttl-seconds: 604800
    issuer: cycling-lab
  auth:
    disabled: false
    local-user:
      email: local@cycling-lab.local
      display-name: Local Rider
  storage:
    local:
      root: ./build/test-training
    minio:
      endpoint: http://localhost:9000
      access-key: minioadmin
      secret-key: minioadmin
      bucket: cycling-lab-test
  content:
    root: .
  cors:
    allowed-origins:
      - http://localhost:5173
