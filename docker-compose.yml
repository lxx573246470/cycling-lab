name: cycling-lab

services:
  postgres:
    image: postgres:16-alpine
    container_name: cycling-lab-postgres
    environment:
      POSTGRES_DB: cycling_lab
      POSTGRES_USER: cycling_lab
      POSTGRES_PASSWORD: cycling_lab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cycling_lab -d cycling_lab"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cycling-lab-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: cycling-lab-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: cycling-lab-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/cycling-lab || true &&
      mc anonymous set download local/cycling-lab || true
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cycling-lab-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cycling_lab
      SPRING_DATASOURCE_USERNAME: cycling_lab
      SPRING_DATASOURCE_PASSWORD: cycling_lab
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: cycling-lab
      JWT_SECRET: ${JWT_SECRET:-change-me-change-me-change-me-change-me-please}
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cycling-lab-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE: /api/v1

volumes:
  postgres_data:
  redis_data:
  minio_data:
